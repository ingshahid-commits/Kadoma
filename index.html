<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadoma - سیستم مدیریت مطالعه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 48px;
            color: #4a5568;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #718096;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        .footer {
            color: rgba(255,255,255,0.8);
            margin-top: 30px;
            font-size: 14px;
        }
        .footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
    <script>
        // انتقال خودکار به game-9.html بعد از 2 ثانیه
        setTimeout(function() {
            window.location.href = 'game-9.html';
        }, 2000);
    </script>
</head>
<body>
    <div class="container">
        <h1>📚 Kadoma</h1>
        <p class="subtitle">سیستم هوشمند مدیریت مطالعه</p>
        <div class="loader"></div>
        <p style="color: #4a5568; margin-top: 20px;">در حال انتقال به برنامه...</p>
        <a href="game-9.html" class="btn">ورود به برنامه</a>
    </div>
    <div class="footer">
        ساخته شده با ❤️ برای دانش‌آموزان ایرانی
    </div>
</body>
</html>
